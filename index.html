<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🥏 Frisbeegolf i Norge</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Mobile sidebar toggle -->
  <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">☰</button>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-drag-handle"></div>
    <div class="sidebar-header">
      <div class="sidebar-header-row">
        <h1 id="app-title">🥏 Frisbeegolf i Norge</h1>
        <button id="lang-toggle" class="lang-toggle" aria-label="Switch language">EN</button>
      </div>
      <p id="app-subtitle" class="subtitle">Utforsk alle frisbeegolfbaner i Norge</p>
    </div>

    <!-- Tab navigation -->
    <div class="tabs">
      <button class="tab active" data-tab="explore" id="tab-btn-explore">Utforsk</button>
      <button class="tab" data-tab="route" id="tab-btn-route">Ruteplanlegger</button>
    </div>

    <!-- Explore Tab -->
    <div id="tab-explore" class="tab-content active">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Søk etter baner..." />
      </div>

      <div class="filters">
        <div class="filter-group">
          <label id="label-rating">Min vurdering</label>
          <select id="filter-rating">
            <option value="0" id="opt-all-ratings">Alle vurderinger</option>
            <option value="3.5">3.5+ ⭐</option>
            <option value="4.0">4.0+ ⭐</option>
            <option value="4.5">4.5+ ⭐</option>
          </select>
        </div>
        <div class="filter-group">
          <label id="label-difficulty">Vanskelighetsgrad</label>
          <select id="filter-difficulty">
            <option value="" id="opt-diff-all">Alle</option>
            <option value="Easy" id="opt-diff-easy">Lett</option>
            <option value="Moderate" id="opt-diff-moderate">Moderat</option>
            <option value="Hard" id="opt-diff-hard">Vanskelig</option>
            <option value="Very Hard" id="opt-diff-veryhard">Veldig vanskelig</option>
          </select>
        </div>
        <div class="filter-group">
          <label id="label-holes">Min hull</label>
          <select id="filter-holes">
            <option value="0" id="opt-holes-all">Alle</option>
            <option value="9">9+</option>
            <option value="18">18+</option>
            <option value="27">27+</option>
          </select>
        </div>
      </div>

      <div class="course-stats">
        <span id="course-count">0</span> <span id="courses-shown-label">baner vist</span>
      </div>

      <div id="course-list" class="course-list"></div>
    </div>

    <!-- Route Planner Tab -->
    <div id="tab-route" class="tab-content">
      <div class="route-form">
        <div class="form-group form-group-autocomplete">
          <label for="route-from" id="label-from">Fra</label>
          <input type="text" id="route-from" placeholder="f.eks. Ålesund" autocomplete="off" />
          <div id="autocomplete-from" class="autocomplete-results"></div>
        </div>
        <div class="form-group form-group-autocomplete">
          <label for="route-to" id="label-to">Til</label>
          <input type="text" id="route-to" placeholder="f.eks. Oslo" autocomplete="off" />
          <div id="autocomplete-to" class="autocomplete-results"></div>
        </div>
        <div class="form-group">
          <label for="route-distance" id="label-max-dist">Maks avstand fra rute</label>
          <select id="route-distance">
            <option value="5">5 km</option>
            <option value="10">10 km</option>
            <option value="20" selected>20 km</option>
            <option value="30">30 km</option>
            <option value="50">50 km</option>
          </select>
        </div>
        <div class="form-group">
          <label for="detour-distance" id="label-max-detour">Maks omvei for gode baner</label>
          <select id="detour-distance">
            <option value="20">20 km</option>
            <option value="30">30 km</option>
            <option value="50" selected>50 km</option>
            <option value="75">75 km</option>
            <option value="100">100 km</option>
          </select>
        </div>
        <div class="form-group">
          <label for="detour-min-rating" id="label-min-rating-detour">Min vurdering for omveiforslag</label>
          <select id="detour-min-rating">
            <option value="4.0">4.0+ ⭐</option>
            <option value="4.2" selected>4.2+ ⭐</option>
            <option value="4.5">4.5+ ⭐</option>
          </select>
        </div>
        <button id="plan-route" class="btn-primary">Planlegg rute</button>
        <button id="clear-route" class="btn-secondary" style="display:none;">Fjern rute</button>
      </div>

      <div id="route-results" class="route-results" style="display:none;">
        <div id="route-info" class="route-info"></div>
        <h3 id="heading-courses-along">📍 Baner langs ruten</h3>
        <div id="route-courses" class="course-list"></div>
        <div id="detour-section" style="display:none;">
          <h3 id="heading-detours">🔄 Foreslåtte omveier</h3>
          <p id="detour-hint-text" class="detour-hint">Disse høyt vurderte banene er verdt en liten omvei!</p>
          <div id="detour-courses" class="course-list"></div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Map container -->
  <div id="map"></div>

  <!-- Loading overlay -->
  <div id="loading" class="loading" style="display:none;">
    <div class="spinner"></div>
    <p id="loading-text">Planlegger ruten din...</p>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>

  <!-- App JS -->
  <script src="js/courses.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/routing.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
